# ──────────────────────────────────────────────────────────────────────────────
# docker-compose.yml - Insecure IoT Environment
#
# Simulates a flat, unprotected IoT network where all devices share the same
# network segment with no authentication, no encryption, and no access control.
#
# Architecture:
#   - One MQTT broker (Mosquitto) with anonymous access enabled
#   - Three IoT sensors publishing data without TLS or authentication
#   - All containers on a single flat network (172.20.0.0/24)
#
# Intentional vulnerabilities:
#   - No TLS on MQTT communication
#   - Anonymous broker access allowed
#   - All devices on the same network segment (no segmentation)
#   - Hardcoded credentials in sensor containers
# ──────────────────────────────────────────────────────────────────────────────

networks:
  iot_flat:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:

  # ────────────────────────────────────────────
  # MQTT Broker - Eclipse Mosquitto (insecure)
  # ────────────────────────────────────────────
  broker:
    image: eclipse-mosquitto:2
    container_name: insecure_broker
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf
    ports:
      - "1883:1883"
    networks:
      iot_flat:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Sensor 1 - Temperature & Humidity (DHT22-like)
  # ────────────────────────────────────────────
  sensor_temp:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    container_name: insecure_sensor_temp
    environment:
      - SENSOR_SCRIPT=sensor_temp.py
      - DEVICE_ID=sensor_temp_01
      - BROKER_HOST=172.20.0.20
      - BROKER_PORT=1883
      - PUBLISH_INTERVAL=5
    depends_on:
      - broker
    networks:
      iot_flat:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Sensor 2 - Door/Window Contact (reed switch-like)
  # ────────────────────────────────────────────
  sensor_door:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    container_name: insecure_sensor_door
    environment:
      - SENSOR_SCRIPT=sensor_door.py
      - DEVICE_ID=sensor_door_01
      - BROKER_HOST=172.20.0.20
      - BROKER_PORT=1883
      - CHECK_INTERVAL=3
      - EVENT_PROBABILITY=0.2
    depends_on:
      - broker
    networks:
      iot_flat:
        ipv4_address: 172.20.0.11
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Sensor 3 - Smart Plug / Power Monitor
  # ────────────────────────────────────────────
  sensor_power:
    build:
      context: ./sensors
      dockerfile: Dockerfile
    container_name: insecure_sensor_power
    environment:
      - SENSOR_SCRIPT=sensor_power.py
      - DEVICE_ID=sensor_power_01
      - BROKER_HOST=172.20.0.20
      - BROKER_PORT=1883
      - PUBLISH_INTERVAL=4
    depends_on:
      - broker
    networks:
      iot_flat:
        ipv4_address: 172.20.0.12
    restart: unless-stopped

  # ────────────────────────────────────────────
  # InfluxDB - Time-Series Database
  # Stores all sensor readings with timestamps.
  # Intentional vulnerability: no authentication enabled
  # ────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7
    container_name: insecure_influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=admin123
      - DOCKER_INFLUXDB_INIT_ORG=iot-cyberrange
      - DOCKER_INFLUXDB_INIT_BUCKET=sensors
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=insecure-token-12345
    ports:
      - "8086:8086"
    networks:
      iot_flat:
        ipv4_address: 172.20.0.30
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Node-RED - IoT Flow Processor
  # Subscribes to MQTT topics and writes data to InfluxDB.
  # Simulates the application logic layer of an IoT platform.
  # Intentional vulnerability: no authentication, admin UI exposed
  # ────────────────────────────────────────────
  nodered:
    image: nodered/node-red:latest
    container_name: insecure_nodered
    environment:
      - TZ=Europe/Rome
    ports:
      - "1880:1880"
    volumes:
      - ./nodered:/data
    depends_on:
      - broker
      - influxdb
    networks:
      iot_flat:
        ipv4_address: 172.20.0.31
    restart: unless-stopped

  # ────────────────────────────────────────────
  # Grafana - Visualization Dashboard
  # Displays real-time sensor data from InfluxDB.
  # Intentional vulnerability: default admin/admin credentials
  # ────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: insecure_grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    networks:
      iot_flat:
        ipv4_address: 172.20.0.32
    restart: unless-stopped
  # ────────────────────────────────────────────
  # Attacker Container - IoT Attack Toolkit
  # Contains all tools and scripts to demonstrate
  # the five attack scenarios against the insecure
  # IoT infrastructure.
  # ────────────────────────────────────────────
  attacker:
    build:
      context: ./attacker
      dockerfile: Dockerfile
    container_name: insecure_attacker
    environment:
      - BROKER_HOST=172.20.0.20
      - BROKER_PORT=1883
      - NODERED_HOST=172.20.0.31
      - INFLUXDB_HOST=172.20.0.30
      - GRAFANA_HOST=172.20.0.32
      - SUBNET=172.20.0.0/24
    depends_on:
      - broker
      - influxdb
      - nodered
      - grafana
    networks:
      iot_flat:
        ipv4_address: 172.20.0.99
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped
